* { margin: 0; padding: 0; box-sizing: border-box; }
body {

  color: #eee;
  padding: 12px;
  padding-bottom: 80px;
  min-height: 100vh;
}
h1 { text-align: center; font-size: 1.1rem; margin-bottom: 8px; color: #e94560; }
.tabs {
  display: flex; gap: 0; margin-bottom: 12px; border-radius: 10px; overflow: hidden;
}
.tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 14px; font-weight: bold;
  background: #16213e; color: #888; cursor: pointer; border: none;
  -webkit-tap-highlight-color: transparent; transition: all 0.2s;
}
.tab.active { background: #e94560; color: #fff; }
.controls { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
.controls input, .controls select {
  padding: 8px 12px; border-radius: 8px; border: 1px solid #333;
  background: #16213e; color: #eee; font-size: 14px;
}
.controls input { flex: 1; min-width: 120px; }
.progress-wrap {
  background: #16213e; border-radius: 8px; height: 26px;
  margin-bottom: 12px; overflow: hidden; position: relative;
}
.progress-fill { background: linear-gradient(90deg,#e94560,#0f3460); height: 100%; transition: width 0.3s; }
.progress-text {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 11px; font-weight: bold;
}
</style>
</head>

function getStorage() {
  try {
    const raw = localStorage.getItem('pz_b42_collection');
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}
function setStorage(data) {
  localStorage.setItem('pz_b42_collection', JSON.stringify(data));
}

function getCount(key) {
  const data = getStorage();
  return data[key] || 0;
}
function setCount(key, val) {
  const data = getStorage();
  if (val <= 0) { delete data[key]; } else { data[key] = val; }
  setStorage(data);
}

  const filter = document.getElementById('filter').value;

  if (currentTab === 'books') renderBooks(app, search, filter);
  else renderVHS(app, search, filter);
}

    group.volumes.forEach(v => {
      totalItems++;
      if (getCount('book_' + group.skill + '_' + v.vol) > 0) { gotItems++; groupGot++; }
    });

    if (filter === 'complete' && groupGot < 5) return;
    if (filter === 'incomplete' && groupGot >= 5) return;

    const isOpen = openGroups[group.skill];
    const badgeClass = groupGot >= 5 ? 'badge done' : 'badge';

    html += '<div class="skill-group">';
    html += '<div class="skill-header" data-group="' + group.skill + '">';
    html += '<span class="name">' + (isOpen ? '▼' : '▶') + ' ' + group.skill + ' (' + group.ja + ')</span>';
    html += '<div style="display:flex;align-items:center;gap:6px;">';
    html += '<div class="vol-cells">';
    group.volumes.forEach(v => {
      const got = getCount('book_' + group.skill + '_' + v.vol) > 0;
      html += '<div class="vol-cell ' + (got ? 'got' : '') + '"></div>';
    });
    html += '</div>';
    html += '<span class="' + badgeClass + '">' + groupGot + '/5</span>';
    html += '</div>';
    html += '</div>';
    html += '<div class="skill-books ' + (isOpen ? 'open' : '') + '">';

    group.volumes.forEach(v => {
      const key = 'book_' + group.skill + '_' + v.vol;
      const count = getCount(key);
      const got = count > 0;

      html += '<div class="book-item ' + (got ? 'got' : '') + '">';
      html += '<div class="book-info">';
      html += '<div class="book-title">Lv.' + v.levels + ' ' + v.mult + ' — Vol.' + v.vol + '</div>';
      html += '<div class="book-meta">' + v.title + '</div>';
      html += '</div>';
      html += '<div class="count-controls">';
      html += '<button class="count-btn minus" data-key="' + key + '">−</button>';
      html += '<span class="count-val">' + count + '</span>';
      html += '<button class="count-btn plus" data-key="' + key + '">+</button>';
      html += '</div></div>';
    });

    html += '</div></div>';
  });

  app.innerHTML = html;
  updateProgress(totalItems, gotItems);
}

function renderVHS(app, search, filter) {
  let html = '';
  let totalItems = 0, gotItems = 0;

  VHS_TAPES.forEach(group => {
    const match = group.series.toLowerCase().includes(search) || group.ja.includes(search);
    if (!match) return;

    let groupGot = 0;
    const groupTotal = group.tapes.length;
    group.tapes.forEach(t => {
      totalItems++;
      if (getCount('vhs_' + group.series + '_' + t.name) > 0) { gotItems++; groupGot++; }
    });

    if (filter === 'complete' && groupGot < groupTotal) return;
    if (filter === 'incomplete' && groupGot >= groupTotal) return;

    const isOpen = openGroups['vhs_' + group.series];
    const badgeClass = groupGot >= groupTotal ? 'badge done' : 'badge';

    html += '<div class="skill-group">';
    html += '<div class="skill-header" data-group="vhs_' + group.series + '">';
    html += '<span class="name">' + (isOpen ? '▼' : '▶') + ' ' + group.series + ' (' + group.ja + ')</span>';
    html += '<div style="display:flex;align-items:center;gap:6px;">';
    html += '<div class="vol-cells">';
    group.tapes.forEach(t => {
      const got = getCount('vhs_' + group.series + '_' + t.name) > 0;
      html += '<div class="vol-cell ' + (got ? 'got' : '') + '"></div>';
    });
    html += '</div>';
    html += '<span class="' + badgeClass + '">' + groupGot + '/' + groupTotal + '</span>';
    html += '</div>';
    html += '</div>';
    html += '<div class="skill-books ' + (isOpen ? 'open' : '') + '">';

    group.tapes.forEach(t => {
      const key = 'vhs_' + group.series + '_' + t.name;
      const count = getCount(key);
      const got = count > 0;

      html += '<div class="book-item ' + (got ? 'got' : '') + '">';
      html += '<div class="book-info">';
      html += '<div class="book-title">' + t.name + '</div>';
      html += '<div class="book-meta">🎯 ' + t.skill + '</div>';
      html += '</div>';
      html += '<div class="count-controls">';
      html += '<button class="count-btn minus" data-key="' + key + '">−</button>';
      html += '<span class="count-val">' + count + '</span>';
      html += '<button class="count-btn plus" data-key="' + key + '">+</button>';
      html += '</div></div>';
    });

    html += '</div></div>';
  });

  app.innerHTML = html;
  updateProgress(totalItems, gotItems);
}

function updateProgress(total, got) {
  const pct = total > 0 ? Math.round((got / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = got + ' / ' + total + ' 取得済 (' + pct + '%)';
}

// === EVENTS ===
document.getElementById('app').addEventListener('click', function(e) {
  const header = e.target.closest('.skill-header');
  if (header) {
    const g = header.dataset.group;
    openGroups[g] = !openGroups[g];
    render();
    return;
  }
  const btn = e.target.closest('.count-btn');
  if (btn) {
    const key = btn.dataset.key;
    let count = getCount(key);
    if (btn.classList.contains('plus')) { count++; }
    else { count = Math.max(0, count - 1); }
    setCount(key, count);
    render();
  }
});

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
    currentTab = this.dataset.tab;
    openGroups = {};
    render();
  });
});

document.getElementById('search').addEventListener('input', render);
document.getElementById('filter').addEventListener('change', render);
document.getElementById('reset-btn').addEventListener('click', function() {
  if (confirm('全てのデータをリセットしますか？')) {
    localStorage.removeItem('pz_b42_collection');
    render();
  }
});

// Init
render();
</script>
